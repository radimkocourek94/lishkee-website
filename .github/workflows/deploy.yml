name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Opt into Node.js 24 for JavaScript actions to silence deprecation warnings
  # and prepare for the runner default switching from Node 20 -> Node 24.
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        uses: withastro/action@v3
        with:
          # Ensure the action runs with a Node version supported by Astro
          # Astro requires Node >=22.12.0 (package.json). The action defaults to
          # Node 20 which caused the CI error. Set node-version to 22 to match
          # the project's engines and the earlier setup-node step.
          node-version: 22

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
